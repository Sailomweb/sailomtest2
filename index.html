<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ข้อสอบ</title>

<style>
body{
  font-family:sans-serif;
  background:#0b1220;
  color:white;
  text-align:center;
  padding:20px;
}

.card{
  background:#111827;
  padding:20px;
  border-radius:14px;
  max-width:520px;
  margin:auto;
}

input{
  padding:10px;
  border-radius:8px;
  border:none;
  width:80%;
}

button{
  padding:10px 16px;
  margin:6px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:#22c55e;
  color:white;
}

.hidden{ display:none; }

.progress{
  height:10px;
  background:#374151;
  border-radius:10px;
  margin:10px 0;
}

.bar{
  height:100%;
  width:0%;
  background:#22c55e;
}
</style>
</head>

<body>

<div id="start" class="card">
  <h2>📌 ข้อสอบ</h2>
  <input id="name" placeholder="ชื่อผู้สอบ">
  <br><br>
  <button onclick="startExam()">เริ่มสอบ</button>
</div>

<div id="exam" class="card hidden">
  <div class="progress"><div id="bar" class="bar"></div></div>
  <h3 id="question"></h3>
  <div id="answers"></div>
</div>

<div id="result" class="card hidden"></div>

<script>

const webhook = "https://discord.com/api/webhooks/1487387131482734732/-SyJfzBweYDymwSWjFjrH2fYw1xRlFV0eQ0csMzmStLxhrJN20wmR6S709uaN-jRTnBq";
const userID = "1396455224390057984";

let questions = [
  {q:"หน้าที่ทหารคือ?", a:["ปกป้องชาติ","เล่น","นอน","เที่ยว"], c:0},
  {q:"วินัยคือ?", a:["สำคัญ","ไม่สำคัญ","งง","เฉยๆ"], c:0},
  {q:"คำสั่ง?", a:["ต้องทำ","ไม่ต้อง","งง","เฉยๆ"], c:0},
  {q:"ความสามัคคี?", a:["สำคัญ","ไม่สำคัญ","งง","เฉยๆ"], c:0},
  {q:"การฝึก?", a:["ช่วยพัฒนา","แย่","งง","เฉยๆ"], c:0},
  {q:"ความอดทน?", a:["จำเป็น","ไม่จำเป็น","งง","เฉยๆ"], c:0},
  {q:"ความรับผิดชอบ?", a:["สำคัญ","ไม่สำคัญ","งง","เฉยๆ"], c:0},
  {q:"ทหารดี?", a:["มีวินัย","ไม่มี","งง","เฉยๆ"], c:0},
  {q:"ความกล้า?", a:["จำเป็น","ไม่จำเป็น","งง","เฉยๆ"], c:0},
  {q:"คำสั่งผู้บังคับ?", a:["ต้องทำ","ไม่ต้อง","งง","เฉยๆ"], c:0},
  {q:"เป้าหมาย?", a:["ปกป้องชาติ","เล่น","เที่ยว","นอน"], c:0},
  {q:"หน้าที่หลัก?", a:["รับผิดชอบ","ปล่อย","ไม่ทำ","งง"], c:0},
  {q:"การฝึกหนัก?", a:["ช่วยได้","แย่","งง","เฉยๆ"], c:0},
  {q:"ระเบียบ?", a:["ต้องมี","ไม่จำเป็น","งง","เฉยๆ"], c:0},
  {q:"ความมีวินัย?", a:["สำคัญ","ไม่สำคัญ","งง","เฉยๆ"], c:0}
];

let current = 0;
let name = "";

function startExam(){

  name = document.getElementById("name").value.trim();

  if(name === ""){
    alert("กรุณากรอกชื่อ");
    return;
  }

  document.getElementById("start").classList.add("hidden");
  document.getElementById("exam").classList.remove("hidden");

  showQuestion();
}

function showQuestion(){

  let q = questions[current];

  document.getElementById("question").innerText = q.q;

  let html = "";

  q.a.forEach((ans,i)=>{
    html += `<button onclick="answer(${i})">${ans}</button><br>`;
  });

  document.getElementById("answers").innerHTML = html;

  let percent = (current / questions.length) * 100;
  document.getElementById("bar").style.width = percent + "%";
}

function answer(i){

  current++;

  if(current < questions.length){
    showQuestion();
  }else{
    finish();
  }
}

function finish(){

  document.getElementById("exam").classList.add("hidden");
  document.getElementById("result").classList.remove("hidden");

  document.getElementById("result").innerHTML = `
    <h2>📌 ทำข้อสอบเสร็จแล้ว</h2>
  `;

  fetch(webhook,{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      content:`<@${userID}>\n📢 ผู้สอบ: ${name}\n📌 ทำข้อสอบเสร็จแล้ว`
    })
  }).catch(()=>{});

}

</script>

</body>
</html>
